# 🎯 제국 기본 좌표 재설정 (콘텐츠 영토로 정조준)
baseURL = 'https://contents.adnamecard.com/'
languageCode = 'ko-kr'
title = 'AD-CONTENTS'  # 콘텐츠 제국 공식 명칭
paginate = 20           # 4,200개를 감당하기 위해 한 페이지당 20척 배치를 권장합니다.

[params]
    env = 'production'
    description = '대한민국 최대 규모의 지식 콘텐츠 및 트렌드 정보 센터'
    author = 'Commander'
    brandColor = "#2c3e50"  # 지식의 신뢰를 상징하는 다크 네이비 포인트
    
    # 💰 애드센스 병기 - 그대로 유지하여 군자금을 확보합니다!
    googleAdsenseId = "ca-pub-8982396795153735"
    googleAnalyticsId = ""

# 📡 상단 내비게이션 메뉴 (지식 전선으로의 길목 확보)
[[menu.main]]
    name = "홈"
    url = "/"
    weight = 1

[[menu.main]]
    name = "전체 콘텐츠"
    url = "/posts/"
    weight = 2

# 🔥 본문 방어막 해제 (4,200개 데이터의 HTML 완벽 수용)
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true  # 표(Table), 인라인 스타일 등 그누보드 데이터를 위한 필수 옵션