# 🎯 제국 기본 좌표 재설정 (새 영토로 조준)
baseURL = 'https://namecard.adnamecard.com/'
languageCode = 'ko-kr'
title = 'Ad-Namecard'  # 제국 공식 명칭
paginate = 15          # 한 페이지당 전함 배치 수 (15척 권장)

[params]
    env = 'production'
    description = '대한민국 최신 명함 광고 및 비즈니스 파트너 정보 센터'
    author = 'Commander'
    brandColor = "#e74c3c"  # 사령관님의 열정적인 레드 포인트
    
    # 💰 애드센스 병기 - 이미 장전 완료되었습니다!
    googleAdsenseId = "ca-pub-8982396795153735"
    googleAnalyticsId = ""

# 📡 상단 내비게이션 메뉴 (명함 전선으로의 길목 확보)
[[menu.main]]
    name = "홈"
    url = "/"
    weight = 1

[[menu.main]]
    name = "명함 광고"
    url = "/posts/"
    weight = 2

# 🔥 본문 방어막 해제 (그누보드 HTML 데이터 완벽 수용)
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true  # 표(Table), 인라인 스타일, 외부 이미지 로딩을 위한 필수 옵션
      
      