# 🎯 제국 글로벌 좌표 설정 (통합 단일 영토)
baseURL = 'https://contents.adnamecard.com/'
languageCode = 'en'            # 사이트의 메인 정체성은 영어로 선언 (SEO 유리)
title = 'AD-CONTENTS' 
paginate = 20

[params]
    env = 'production'
    description = 'Global Knowledge Content & Trend Information Hub'
    author = 'Commander'
    brandColor = "#2c3e50"
    googleAdsenseId = "ca-pub-8982396795153735"

# 📡 통합 내비게이션 (깔끔하게 영문으로 고정)
[[menu.main]]
    name = "Home"
    url = "/"
    weight = 1

[[menu.main]]
    name = "All Posts"
    url = "/posts/"
    weight = 2

# 🔥 콘텐츠 렌더링 및 빌드 옵션
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

buildFuture = true
buildDrafts = true